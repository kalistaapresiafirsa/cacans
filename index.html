<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caca Cans · Update Kehidupan</title>
  <!-- Google Font & Font Awesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 30%, #fae6db, #f1d3c4);
      font-family: 'Quicksand', sans-serif;
      padding: 1.5rem;
    }

    /* Kartu utama – elegan, transparan dengan efek kaca */
    .card {
      max-width: 820px;
      width: 100%;
      background: rgba(255, 248, 242, 0.7);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 56px;
      padding: 2rem 2rem 2.8rem;
      box-shadow: 0 35px 60px -20px rgba(80, 40, 20, 0.3),
                  inset 0 1px 3px rgba(255, 245, 235, 0.8);
      border: 1px solid rgba(255, 235, 215, 0.5);
      transition: all 0.25s ease;
      text-align: center;
    }

    /* --- Video Streaming --- */
    .video-wrapper {
      width: 100%;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 16px 32px -12px rgba(90, 50, 30, 0.35);
      margin-bottom: 1.8rem;
      border: 2px solid rgba(255, 235, 215, 0.5);
      background: #1a1a1a;
      aspect-ratio: 16 / 9;
      transition: transform 0.2s ease;
    }

    .video-wrapper:hover {
      transform: scale(1.005);
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: none;
    }

    /* Fallback jika iframe tidak bisa memuat video (misal: non-HTTPS) 
       kita tetap tampilkan dengan cara embed biasa, tetapi user tetap bisa akses */
    .video-fallback {
      display: none;
      padding: 1rem;
      background: rgba(0,0,0,0.03);
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }

    /* Avatar dengan sentuhan gradien */
    .avatar-frame {
      position: relative;
      display: inline-block;
      margin-bottom: 0.4rem;
    }

    .avatar {
      width: 120px;
      height: 120px;
      background: linear-gradient(145deg, #fbc4b0, #e8927a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: #fff7ef;
      box-shadow: 0 20px 30px -8px rgba(190, 110, 75, 0.4);
      border: 4px solid rgba(255, 240, 230, 0.8);
      transition: transform 0.25s ease;
    }

    .avatar i {
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.08));
    }

    .avatar:hover {
      transform: scale(1.02) rotate(-3deg);
    }

    /* Gelombang tangan */
    .wave-icon {
      display: inline-block;
      font-size: 1.9rem;
      margin-left: 0.2rem;
      animation: wave 2.6s infinite ease-in-out;
      transform-origin: 70% 70%;
    }

    @keyframes wave {
      0% { transform: rotate(0deg); }
      20% { transform: rotate(16deg); }
      40% { transform: rotate(-6deg); }
      60% { transform: rotate(12deg); }
      80% { transform: rotate(-4deg); }
      100% { transform: rotate(0deg); }
    }

    h1 {
      font-size: 3.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #3b281e;
      margin: 0.1rem 0 0.1rem;
      line-height: 1.1;
    }

    h1 .highlight {
      background: linear-gradient(135deg, #bc765d, #a55841);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }

    /* Badge profesi */
    .badge-profesi {
      display: inline-block;
      background: rgba(190, 120, 90, 0.15);
      backdrop-filter: blur(4px);
      padding: 0.5rem 2rem;
      border-radius: 60px;
      border: 1px solid rgba(190, 120, 90, 0.25);
      margin: 0.2rem 0 1rem;
      font-size: 1.5rem;
      font-weight: 600;
      color: #412f23;
      letter-spacing: 0.5px;
      box-shadow: 0 6px 14px -6px rgba(140, 80, 50, 0.12);
    }

    .badge-profesi i {
      margin-right: 12px;
      color: #b45f48;
      font-size: 1.2rem;
    }

    .divider {
      width: 90px;
      height: 4px;
      background: linear-gradient(90deg, #dcb6a2, #cb927b);
      border-radius: 8px;
      margin: 0.6rem auto 1.4rem;
      opacity: 0.5;
    }

    /* Bio singkat */
    .bio {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #4d382a;
      max-width: 480px;
      margin: 0 auto 1.8rem;
      background: rgba(255, 240, 230, 0.4);
      padding: 1rem 1.8rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 215, 190, 0.25);
      font-weight: 400;
    }

    .bio i {
      color: #b45f48;
      margin: 0 4px;
    }

    /* Grid fitur */
    .feature-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem 1.6rem;
      margin: 1.6rem 0 1.8rem;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 242, 232, 0.6);
      backdrop-filter: blur(4px);
      padding: 0.4rem 1.4rem 0.4rem 1rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 215, 190, 0.35);
      font-weight: 500;
      color: #3d2a1e;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px -4px rgba(130, 70, 40, 0.06);
    }

    .feature-item i {
      font-size: 1.2rem;
      color: #b45f48;
      width: 1.6rem;
      text-align: center;
    }

    .feature-item:hover {
      background: rgba(255, 230, 215, 0.8);
      transform: translateY(-3px);
      border-color: #d4957a;
      box-shadow: 0 12px 20px -10px rgba(160, 90, 60, 0.15);
    }

    /* Tombol Instagram – tautan langsung */
    .ig-button {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, #e4a084, #c47b61);
      border: none;
      padding: 0.8rem 2.6rem;
      border-radius: 60px;
      font-size: 1.15rem;
      font-weight: 600;
      color: #fffcf7;
      box-shadow: 0 14px 28px -10px rgba(160, 90, 60, 0.4);
      transition: all 0.25s ease;
      border: 1px solid rgba(255, 235, 210, 0.3);
      text-decoration: none;
      letter-spacing: 0.3px;
      margin-top: 0.2rem;
      cursor: pointer;
    }

    .ig-button i {
      font-size: 1.5rem;
      transition: transform 0.25s ease;
      color: #fff;
    }

    .ig-button:hover {
      transform: scale(1.03) translateY(-2px);
      box-shadow: 0 20px 34px -12px #b06b4f;
      background: linear-gradient(135deg, #ecad91, #cf866b);
    }

    .ig-button:hover i {
      transform: scale(1.1) rotate(-4deg);
    }

    /* Footer dengan info tambahan */
    .footnote {
      margin-top: 2.4rem;
      font-size: 0.9rem;
      color: #897061;
      letter-spacing: 0.4px;
      border-top: 1px solid rgba(200, 165, 145, 0.25);
      padding-top: 1.6rem;
      display: flex;
      justify-content: center;
      gap: 1.8rem;
      flex-wrap: wrap;
    }

    .footnote span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 235, 215, 0.25);
      padding: 0.2rem 1.2rem;
      border-radius: 40px;
      backdrop-filter: blur(2px);
    }

    .footnote i {
      color: #b45f48;
      font-size: 0.9rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .card {
        padding: 1.2rem 1rem 2rem;
        border-radius: 32px;
      }
      h1 {
        font-size: 2.6rem;
      }
      .badge-profesi {
        font-size: 1.1rem;
        padding: 0.4rem 1.4rem;
      }
      .bio {
        font-size: 0.95rem;
        padding: 0.8rem 1.2rem;
      }
      .avatar {
        width: 90px;
        height: 90px;
        font-size: 3rem;
      }
      .feature-grid {
        gap: 0.5rem;
      }
      .feature-item {
        padding: 0.3rem 1rem 0.3rem 0.8rem;
        font-size: 0.85rem;
      }
      .ig-button {
        padding: 0.6rem 1.8rem;
        font-size: 0.95rem;
        gap: 10px;
      }
      .ig-button i {
        font-size: 1.2rem;
      }
      .video-wrapper {
        border-radius: 28px;
        margin-bottom: 1.2rem;
      }
    }

    @media (max-width: 420px) {
      .card {
        padding: 1rem 0.8rem 1.8rem;
      }
      h1 {
        font-size: 2.2rem;
      }
      .badge-profesi {
        font-size: 0.95rem;
        padding: 0.3rem 1rem;
      }
      .video-wrapper {
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- === VIDEO STREAMING (di bagian atas) === -->
    <div class="video-wrapper">
      <!-- Jika ingin menggunakan embed biasa, kita gunakan iframe dengan src dari IP -->
      <!-- Karena IP mungkin tidak support HTTPS, kita tetap taruh di iframe, 
           namun jika browser memblokir, kita kasih link alternatif dibawah -->
      <iframe 
        src="http://10.101.209.89" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen
        loading="lazy"
        title="Live Streaming Caca Cans"
      ></iframe>
    </div>

    <!-- Fallback text jika iframe tidak muncul (misal: karena kebijakan CORS) 
         tetap tampilkan link agar user bisa mengakses -->
    <div style="margin: -0.8rem 0 0.8rem; font-size: 0.85rem; color: #7f6a5c; opacity: 0.7; display: flex; justify-content: center; gap: 0.8rem; flex-wrap: wrap;">
      <span><i class="fas fa-video" style="color:#b45f48;"></i> <a href="http://10.101.209.89" target="_blank" style="color:#7f5f4a; text-decoration:underline; font-weight:500;">Buka streaming langsung</a></span>
      <span><i class="fas fa-external-link-alt" style="color:#b45f48;"></i> <span>klik jika video tidak muncul</span></span>
    </div>

    <!-- Avatar -->
    <div class="avatar-frame">
      <div class="avatar">
        <i class="fas fa-pen-fancy"></i>
      </div>
    </div>

    <!-- Nama dengan aksen -->
    <h1>
      <span class="highlight">Caca Cans</span>
      <span class="wave-icon">👋</span>
    </h1>

    <!-- Profesi -->
    <div class="badge-profesi">
      <i class="fas fa-sync-alt fa-fw"></i> Update Kehidupan
    </div>

    <div class="divider"></div>

    <!-- Deskripsi singkat -->
    <div class="bio">
      <i class="fas fa-quote-left" style="opacity:0.4; margin-right: 6px;"></i>
      Menulis ulang cerita, satu <i class="fas fa-heart" style="color:#d47a62;"></i> 
      momen berharga dalam keseharian.
      <i class="fas fa-quote-right" style="opacity:0.4; margin-left: 6px;"></i>
    </div>

    <!-- Grid nilai / vibe -->
    <div class="feature-grid">
      <div class="feature-item">
        <i class="fas fa-camera-retro"></i> Momen
      </div>
      <div class="feature-item">
        <i class="fas fa-pencil-alt"></i> Catatan
      </div>
      <div class="feature-item">
        <i class="fas fa-smile-beam"></i> Cerita
      </div>
      <div class="feature-item">
        <i class="fas fa-seedling"></i> Tumbuh
      </div>
    </div>

    <!-- Tombol ke Instagram @aprfkalista (tautan aktif) -->
    <a href="https://instagram.com/aprfkalista" target="_blank" class="ig-button">
      <i class="fab fa-instagram"></i> @aprfkalista
      <i class="fas fa-arrow-right" style="font-size:1rem; opacity:0.8;"></i>
    </a>

    <!-- Footer -->
    <div class="footnote">
      <span><i class="fas fa-calendar-check"></i> #HariIni</span>
      <span><i class="fas fa-hashtag"></i> #KehidupanCaca</span>
      <span><i class="fas fa-mug-hot"></i> setiap hari</span>
    </div>
  </div>
</body>
</html>
